<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Claude Remote — Bridge Test Client</title>
<style>
  :root { color-scheme: dark; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 0; background:#111418; color:#e6e6e6; }
  header { padding:12px 16px; background:#0b0d10; border-bottom:1px solid #23272e; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  #status { font-size:12px; padding:2px 8px; border-radius:10px; background:#23272e; }
  #status.ready { background:#14432a; color:#7ee2a8; }
  #status.busy  { background:#3a2f0b; color:#e9c76a; }
  #status.err   { background:#4a1d1d; color:#f0a0a0; }
  main { max-width:820px; margin:0 auto; padding:16px; }
  #log { white-space:pre-wrap; word-break:break-word; background:#0b0d10; border:1px solid #23272e; border-radius:8px; padding:14px; min-height:320px; }
  .role { color:#6ea8fe; font-weight:600; }
  .tool { color:#e9c76a; }
  .err  { color:#f0a0a0; }
  .perm { background:#3a2f0b; border:1px solid #6b5514; border-radius:8px; padding:10px; margin:8px 0; }
  .perm button { margin-right:8px; }
  form { display:flex; gap:8px; margin-top:12px; }
  input[type=text]{ flex:1; padding:10px; border-radius:8px; border:1px solid #333; background:#0b0d10; color:#e6e6e6; }
  button { padding:10px 14px; border-radius:8px; border:1px solid #333; background:#1b2027; color:#e6e6e6; cursor:pointer; }
  button:hover { background:#232a33; }
  .bar { display:flex; gap:8px; margin-top:8px; }
</style>
</head>
<body>
<header>
  <h1>Claude Remote — Bridge Test Client</h1>
  <input id="url" type="text" value="ws://localhost:8765" style="width:200px" />
  <button id="connect">Connect</button>
  <span id="status">disconnected</span>
</header>
<main>
  <div id="log"></div>
  <form id="composer">
    <input id="text" type="text" placeholder="Type a prompt for the Claude session…" autocomplete="off" />
    <button type="submit">Send</button>
  </form>
  <div class="bar">
    <button id="mode">⇧⇥ Mode: <span id="modeName">default</span></button>
    <button id="interrupt">■ Stop</button>
    <button id="new">＋ New session</button>
    <button id="clear">Clear log</button>
  </div>
</main>

<script>
// ---- Wire protocol (client <-> bridge) --------------------------------
// Client -> bridge:
//   {type:"prompt", text}          send a user turn
//   {type:"interrupt"}             stop current response
//   {type:"new_session"}           reset the session
//   {type:"permission", id, allow} approve/deny a tool-use request
//   {type:"set_mode", mode}        "default" | "acceptEdits" | "plan"  (Shift+Tab)
//   {type:"cycle_mode"}            advance to the next mode (what the Mode button sends)
// Bridge -> client:
//   {type:"status", state, mode}   state: "ready"|"thinking"|"running_tool"|"done"; mode: current permission mode
//   {type:"text", delta}           streamed assistant text chunk
//   {type:"tool_use", name, input} a tool is being invoked
//   {type:"permission_request", id, tool, input}
//   {type:"result", text}          turn finished (final text)
//   {type:"transcript", text}      speech-to-text result (push-to-talk)
//   {type:"error", message}
// -----------------------------------------------------------------------

let ws = null;
const $ = (id) => document.getElementById(id);
const log = $('log');

function setStatus(txt, cls) { const s=$('status'); s.textContent=txt; s.className=cls||''; }
function line(html) { const d=document.createElement('div'); d.innerHTML=html; log.appendChild(d); log.scrollTop=log.scrollHeight; return d; }

let streamEl = null;
function appendDelta(delta) {
  if (!streamEl) { streamEl = line('<span class="role">Claude:</span> '); }
  streamEl.appendChild(document.createTextNode(delta));
  log.scrollTop = log.scrollHeight;
}

function connect() {
  const url = $('url').value.trim();
  if (ws) { ws.close(); ws = null; }
  setStatus('connecting…','busy');
  ws = new WebSocket(url);
  ws.onopen  = () => setStatus('connected','ready');
  ws.onclose = () => setStatus('disconnected','err');
  ws.onerror = () => setStatus('error','err');
  ws.onmessage = (ev) => {
    let m; try { m = JSON.parse(ev.data); } catch { return; }
    switch (m.type) {
      case 'status':
        setStatus(m.state, m.state==='ready'||m.state==='done' ? 'ready':'busy');
        if (m.mode) $('modeName').textContent = m.mode;
        if (m.state==='thinking' || m.state==='done') streamEl = null;
        break;
      case 'text': appendDelta(m.delta); break;
      case 'tool_use': line(`<span class="tool">⚙ tool:</span> ${m.name} <code>${escapeHtml(JSON.stringify(m.input))}</code>`); streamEl=null; break;
      case 'permission_request': renderPermission(m); break;
      case 'result': streamEl=null; break;
      case 'transcript': $('text').value = m.text; break;
      case 'error': line(`<span class="err">error:</span> ${escapeHtml(m.message)}`); break;
    }
  };
}

function renderPermission(m) {
  const box = document.createElement('div');
  box.className = 'perm';
  box.innerHTML = `<b>Permission requested:</b> ${escapeHtml(m.tool)} <code>${escapeHtml(JSON.stringify(m.input))}</code><br>`;
  const allow = document.createElement('button'); allow.textContent='✔ Allow';
  const deny  = document.createElement('button'); deny.textContent='✗ Deny';
  allow.onclick = () => { send({type:'permission', id:m.id, allow:true }); box.remove(); };
  deny.onclick  = () => { send({type:'permission', id:m.id, allow:false}); box.remove(); };
  box.appendChild(allow); box.appendChild(deny);
  log.appendChild(box); log.scrollTop = log.scrollHeight;
}

function send(obj) { if (ws && ws.readyState===1) ws.send(JSON.stringify(obj)); }
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

$('connect').onclick = connect;
$('composer').onsubmit = (e) => {
  e.preventDefault();
  const t = $('text').value.trim(); if (!t) return;
  line(`<span class="role">You:</span> ${escapeHtml(t)}`);
  send({type:'prompt', text:t});
  $('text').value=''; streamEl=null;
};
$('mode').onclick = () => send({type:'cycle_mode'});
$('interrupt').onclick = () => send({type:'interrupt'});
$('new').onclick = () => { send({type:'new_session'}); line('<i>— new session —</i>'); streamEl=null; };
$('clear').onclick = () => log.innerHTML='';

connect();
</script>
</body>
</html>
